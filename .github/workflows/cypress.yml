name: cypress

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/*'
      - 'cypress/**'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - run: npm i yarn serve@14.0.1 -g
    - run: yarn
    - run: yarn run build
    - run: mv dist canvas-editor
    - run: serve . -l 3000 &
    - run: yarn run cypress:run